version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: movie_booking
      POSTGRES_USER: movie_user
      POSTGRES_PASSWORD: movie_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://movie_user:movie_password@db:5432/movie_booking
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
